<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — leylatech.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --bg: #f7f9fc;
      --blue: #4dd9c8;
      --blue2: #3bc4b3;
      --blue-light: #e8faf8;
      --text: #1a1a2e;
      --muted: #9a9fb8;
      --border: #eaecf4;
      --display: 'Cormorant Garamond', serif;
      --body: 'DM Sans', sans-serif;
    }

    html, body { height: 100%; }
    body {
      background: var(--white);
      color: var(--text);
      font-family: var(--body);
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .nav-logo span { color: var(--blue); }

    .nav-contact {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      text-decoration: none;
      border-bottom: 1px solid var(--blue);
      padding-bottom: 2px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 48px 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 60px;
      transition: color 0.2s;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    .back-link:hover { color: var(--blue); }

    .back-link::before {
      content: '←';
      font-size: 14px;
    }

    .contact-title {
      font-family: var(--display);
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 600;
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 60px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 28px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.4s;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 18px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      width: fit-content;
    }

    .contact-link:hover { color: var(--text); }

    .contact-link svg {
      width: 22px; height: 22px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .contact-link-text {
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .contact-link:hover .contact-link-text {
      border-color: var(--blue);
    }

    footer {
      padding: 24px 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .footer-right {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .footer-right a {
      color: var(--blue);
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .page { padding: 100px 24px 60px; }
      footer { flex-direction: column; gap: 8px; padding: 24px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">leyla<span>tech</span>.com</a>
    <a href="contact.html" class="nav-contact">Contact</a>
  </nav>

  <section class="page">
    <a href="index.html" class="back-link">Back to home</a>
    <div class="contact-title">Contact</div>
    <div class="contact-links">
      <a href="mailto:lg3451@columbia.edu" class="contact-link">

        <span class="contact-link-text">lg3451@columbia.edu</span>
      </a>
      <a href="https://www.linkedin.com/in/leyla-guliyeva" target="_blank" class="contact-link">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        <span class="contact-link-text">linkedin.com/in/leyla-guliyeva</span>
      </a>
    </div>
  </section>

  <footer>
    <div class="footer-left">© 2026 LEYLA G. — LEYLATECH.COM</div>
    <div class="footer-right">For my quant specific projects visit <a href="https://leylaquant.com">leylaquant.com</a></div>
  </footer>

</body>
</html>
