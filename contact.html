<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — leylatech.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --bg: #f9fafb;
      --teal: #5bbfb5;
      --teal-light: #edf8f7;
      --text: #1c2333;
      --muted: #8e97a8;
      --border: #eef0f4;
      --display: 'Lora', serif;
      --body: 'Jost', sans-serif;
      --radius: 16px;
    }

    html { height: 100%; }
    body {
      min-height: 100vh;
      background: var(--white);
      color: var(--text);
      font-family: var(--body);
      font-weight: 300;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 52px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--body);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--teal); }

    .nav-contact {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      text-decoration: none;
      font-weight: 400;
      transition: opacity 0.2s;
    }
    .nav-contact:hover { opacity: 0.6; }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 140px 48px 80px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 52px;
      transition: color 0.2s;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
      font-weight: 400;
    }
    .back-link:hover { color: var(--teal); }
    .back-link::before { content: '←'; font-size: 14px; }

    .contact-title {
      font-family: var(--display);
      font-size: clamp(42px, 7vw, 80px);
      font-weight: 500;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.2s;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.4s;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      padding: 16px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      min-width: 320px;
      justify-content: center;
    }

    .contact-link:hover {
      color: var(--teal);
      border-color: var(--teal);
      background: var(--teal-light);
    }

    .contact-link svg {
      width: 18px; height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    footer {
      padding: 28px 48px 40px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
    }

    .footer-left, .footer-right {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 300;
    }

    .footer-right a { color: var(--teal); text-decoration: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      nav { padding: 20px 24px; }
      .page { padding: 120px 24px 60px; }
      .contact-link { min-width: unset; width: 100%; }
      footer { padding: 24px 24px 36px; }
    }
  </style>
</head>
<body>

  <nav>

  </nav>

        linkedin.com/in/leyla-guliyeva
      </a>
    </div>
  </section>

  <footer>
    <div class="footer-left">© 2026 LEYLA G. — LEYLATECH.COM</div>
    <div class="footer-right">For my quant specific projects visit <a href="https://leylaquant.com">leylaquant.com</a></div>
  </footer>

</body>
</html>
